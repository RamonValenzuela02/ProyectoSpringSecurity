spring.application.name=ProjectSecurity

# DATASOURCE (MySQL)
#falta ponerlo en variables de entorno
spring.datasource.url= ${SD_URL}
spring.datasource.username=${SD_USERNAME}
spring.datasource.password=${SD_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT
security.jwt.private.key=${JWT_PRIVATE_KEY}
security.jwt.user.generator=${JWT_USER_GENERATOR}